<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>EX038 BOOT</title>
    <style>
        .carousel-img {
            height: 500px;
            width: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <div class="container-fluid mx-auto my-4 d-flex justify-content-center align-items-center w-50">
        <div id="carrosel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#carrosel" data-bs-slide-to="0" class="active" aria-current="true"></button>
                <button type="button" data-bs-target="#carrosel" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#carrosel" data-bs-slide-to="2"></button>
            </div>
            <div class="carousel-inner">

                <div class="carousel-item active">
                    <img src="images/image-4.jpg" class="d-block img-fluid carousel-img">
                </div>
                <div class="carousel-caption d-none d-md-block">
                    <h5>Wallpaper 1</h5>
                    <p>Wallpaper massa!</p>
                </div>
                
                <div class="carousel-item">
                    <img src="images/image-5.jpg" class="d-block img-fluid carousel-img">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Wallpaper 2</h5>
                        <p>Wallpaper Bom!</p>
                    </div>
                </div>

                <div class="carousel-item">
                    <img src="images/image-6.jpg" class="d-block img-fluid carousel-img">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Wallpaper 3</h5>
                        <p>Wallpaper bonzinho!</p>
                    </div>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carrosel"  data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Anterior</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carrosel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Proximo</span>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
