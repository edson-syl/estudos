<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EX006 FUNCAO</title>
</head>
<body>
    <script>
        var seunum = prompt("Informe seu numero: ")

        var ehPar = function(num) {
            num % 2 == 0 ? window.alert("Seu numero eh par!") : window.alert("Seu numero eh impar!")
        }

        ehPar(seunum)
    </script>
</body>
</html>
