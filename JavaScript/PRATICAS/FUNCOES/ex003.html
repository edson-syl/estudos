    <script>
        numeros = [1, 2, 3, 4]

        function multiplicarArray(array, num) {
            for (var i = 0; i < array.length; i++) {
                array[i] = array[i] * num;
            }

            console.log(array)
        }

        
        multiplicarArray(numeros, 3);
    </script>
