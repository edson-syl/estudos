<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EX009 AJAX</title>
</head>
<body>
    <script>
        var palavrachave = 'au'
        var xhr = new XMLHttpRequest;
        xhr.open("GET", "https://jsonplaceholder.typicode.com/posts?utm_source=chatgpt.com", true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState == 4 && xhr.status == 200) {
                var dados = JSON.parse(xhr.responseText);
                var dadosfiltrados = dados.filter(d => d.title.includes(palavrachave));
                dadosfiltrados.forEach(dados => {
                    console.log(dados);
                });
                
            }
        }
        xhr.send();
    </script>
</body>
</html>
