<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EX007 JQUERY</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
</head>
<body>
    <form>
        <h1>Avaliacao</h1>
        <input type="radio" class="star" name="star" value="⭐">⭐<br>
        <input type="radio" class="star" name="star" value="⭐⭐">⭐⭐<br>
        <input type="radio" class="star" name="star" value="⭐⭐⭐">⭐⭐⭐<br>
        <input type="radio" class="star" name="star" value="⭐⭐⭐⭐">⭐⭐⭐⭐<br>
        <input type="radio" class="star" name="star" value="⭐⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐<br>
        <button type="button" onclick="mostrarAvaliacao()">Avaliar</button>
    </form>
    
    <div></div>

    <script>
        function mostrarAvaliacao() {
            var ava = $('.star:checked').val();
            $('div').html('')
            $('div').append('<h1>Sua avaliacao:</h1><br>', ava )
        }
    </script>
</body>
</html>
