<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EX 002 SWITCH</title>
</head>
<body>
    <script>
        var a = 10;
        var b = 5;
        var operacao = "/";

        switch(operacao) {
            case "+":
                window.alert(a + b);
                break;
            case "-":
                window.alert(a - b);
                break;
            case "/":
                window.alert(a / b);
                break;
            case "*":
                window.alert(a * b);
                break;
            default:
                window.alert("Operacao Invalida!")
        }
    </script>
</body>
</html>
