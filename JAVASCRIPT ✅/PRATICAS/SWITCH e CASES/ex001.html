<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EX 001 SWITCH</title>
</head>
<body>
    <script>
        let = dia = 1;
        switch(dia) {
            case 1:
                window.alert('Domingo')
                break;
            case 2:
                window.alert('Segunda')
                break;
            case 3:
                window.alert('Terca')
                break;
            case 4:
                window.alert('Quarta')
                break;
            case 5:
                window.alert('Quinta')
                break;
            case 6:
                window.alert('Sexta')
                break;
            case 7:
                window.alert('Sabado')
                break;
            default:
                window.alert("Dia invalido!")

            
        }
    </script>
</body>
</html>
