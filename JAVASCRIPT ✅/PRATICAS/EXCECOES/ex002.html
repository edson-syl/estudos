<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EX002 EXCECAO</title>
</head>
<body>
    <script>
        var cores = ["vermelho", "verde", "azul"];

        function pegarCor(indice) {
            var indiceofc = indice - 1;
            try {
                if (indiceofc >= cores.length) {
                    throw new Error("Indice invalido!")
                }
                console.log(cores[indiceofc])
            }
            catch (e) {
                console.log(e.message)
            }
        }

        pegarCor(4)
    </script> 
</body>
</html>
