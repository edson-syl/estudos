<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EX008 AJAX</title>
</head>
<body>
    <h1>NOTICIAS</h1>
    <div id="noticias">
    </div>
    <script>
        var noticias_div = document.getElementById('noticias')
        var xhr = new XMLHttpRequest;
        xhr.open('GET', 'https://jsonplaceholder.typicode.com/posts?utm_source=chatgpt.com', true);
        xhr.onreadystatechange = function() {
            if ( xhr.readyState == 4 && xhr.status == 200) {
                var dados = JSON.parse(xhr.responseText);
                for (var i = 0; i < 5; i++) {
        
                    noticias_div.innerHTML += 
                    '<br>Titulo: ' + dados[i].title +
                    '<br>Resumo: ' + dados[i].body + '<br>';
                   
                }
            }
        }
        xhr.send();
    </script>
</body>
</html>
